services:
  db:
    container_name: django-pub-db
    image: postgres:15
    env_file:
      - ./environment/postgresql.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  web:
    container_name: django-pub-backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./environment/backend.env
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
